name: Daily Contest Update

on:
  schedule:
    # 매일 오전 9시 KST = UTC 00:00
    - cron: "0 0 * * *"
  workflow_dispatch:  # 수동 실행 버튼도 활성화

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 크롤링 실행
        run: python scraper.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data.json
          git diff --cached --quiet || git commit -m "chore: daily update $(date +'%Y-%m-%d')"
          git push
